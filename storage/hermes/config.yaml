# Hermes Agent -- configuration
# Secrets (GHL_PIT_TOKEN, OPENROUTER_API_KEY, API_SERVER_KEY) come from env vars.
# Commit this file: it contains no secrets, only references.

# -- Default model and provider ----------------------------------------
# OpenRouter model ID format: <provider>/<model>. Browse: openrouter.ai/models
# Cheap for dev/smoke: openai/gpt-4o-mini
# Best tool-use for SDR prod: anthropic/claude-3.5-sonnet
model: openai/gpt-4o-mini

# -- External MCP servers ----------------------------------------------
# GoHighLevel official MCP server. Auth via Private Integration Token (PIT)
# created per sub-account in GHL -> Settings -> Private Integrations.
# Docs: https://marketplace.gohighlevel.com/docs/other/mcp/index.html
mcp_servers:
  ghl:
    url: https://services.leadconnectorhq.com/mcp/
    headers:
      Authorization: "Bearer ${GHL_PIT_TOKEN}"
      # Required when the PIT is broad-scoped (Agency-level) OR the PIT's
      # allowed-locations list has more than one entry. Without this header
      # GHL returns 403 "The token does not have access to this location".
      locationId: "${GHL_LOCATION_ID}"
    # GHL MCP only implements tools (no resources, no prompts). Without
    # these flags, Hermes probes resources/list and prompts/list at boot,
    # GHL returns "Method not found", and Hermes drops the whole server.
    tools:
      resources: false
      prompts: false

# -- Inbound webhook routes --------------------------------------------
# Exposes HTTP endpoints on port 8644 that transform incoming payloads
# into agent prompts. Used here to receive GHL InboundMessage events
# and fire the sdr skill to respond automatically.
platforms:
  webhook:
    enabled: true
    extra:
      port: 8644
      rate_limit: 30
      max_body_bytes: 1048576
      routes:
        ghl-inbound:
          # TEMPORARY: literal "INSECURE_NO_AUTH" disables HMAC verification
          # so we can wire up the GHL workflow without worrying about
          # signature formats. Switch back to "${GHL_WEBHOOK_SECRET}" with a
          # real env-var value once GHL is posting successfully.
          # SECURITY: this route accepts ANY POST. Acceptable only because
          # the only write action that can happen is conversations_send-a-new-message
          # through the ghl MCP, which is gated by compliance rules in the
          # sdr skill. Do not ship this to a public marketing domain.
          secret: INSECURE_NO_AUTH
          # Agent prompt: maps GHL payload fields into an SDR activation.
          # GHL InboundMessage payload fields referenced:
          #   type, locationId, contactId, conversationId,
          #   messageType (SMS/Email/Call), direction (inbound/outbound), body
          prompt: |
            A GoHighLevel inbound event arrived.

            Event type: {type}
            Location ID: {locationId}
            Contact ID: {contactId}
            Conversation ID: {conversationId}
            Message type: {messageType}
            Direction: {direction}
            Inbound message body: {body}

            Use the sdr skill in LIVE mode (agent_name=Alex,
            brand=TestBrand Marketing) to decide how to respond.
            Follow the skill's compliance gate and objection handling.
            You MUST call skill_view('sdr') first to load the procedure.

            Full raw payload for reference:
            {__raw__}
          skills: [sdr]
          # No `deliver:` block: the SDR skill itself calls
          # conversations_send-a-new-message via the ghl MCP to reply.
          # Hermes's webhook response is just the synchronous ack.
