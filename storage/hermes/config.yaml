# Hermes Agent -- configuration
# Secrets (GHL_PIT_TOKEN, OPENROUTER_API_KEY, API_SERVER_KEY) come from env vars.
# Commit this file: it contains no secrets, only references.

# -- Default model and provider ----------------------------------------
# OpenRouter model ID format: <provider>/<model>. Browse: openrouter.ai/models
# Cheap for dev/smoke: openai/gpt-4o-mini
# Best tool-use for SDR prod: anthropic/claude-3.5-sonnet
model: openai/gpt-4o-mini

# -- External MCP servers ----------------------------------------------
# GoHighLevel official MCP server. Auth via Private Integration Token (PIT)
# created per sub-account in GHL -> Settings -> Private Integrations.
# Docs: https://marketplace.gohighlevel.com/docs/other/mcp/index.html
mcp_servers:
  ghl:
    url: https://services.leadconnectorhq.com/mcp/
    headers:
      Authorization: "Bearer ${GHL_PIT_TOKEN}"
      # Required when the PIT is broad-scoped (Agency-level) OR the PIT's
      # allowed-locations list has more than one entry. Without this header
      # GHL returns 403 "The token does not have access to this location".
      locationId: "${GHL_LOCATION_ID}"
    # GHL MCP only implements tools (no resources, no prompts). Without
    # these flags, Hermes probes resources/list and prompts/list at boot,
    # GHL returns "Method not found", and Hermes drops the whole server.
    tools:
      resources: false
      prompts: false
