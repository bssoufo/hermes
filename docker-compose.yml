# Hermes Agent on Elestio
# Reverse proxy target port (set in Elestio dashboard): 8642
services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    env_file: .env
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"   # required for non-loopback access
      API_SERVER_PORT: "8642"
      TERMINAL_ENV: "docker"       # sandboxed subagent terminals
    ports:
      # Elestio convention: bind to docker0 bridge; host nginx-auto-ssl
      # reverse-proxies this with Let's Encrypt. Never bind 0.0.0.0 here.
      - "172.17.0.1:8642:8642"
    volumes:
      - ./storage/hermes:/opt/data
    shm_size: "1gb"                # Playwright/Chromium needs > 64MB /dev/shm
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8642/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks: [hermes-net]
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "1.8"
        reservations:
          memory: 1G
          cpus: "0.5"

  dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    command: dashboard --host 0.0.0.0
    env_file: .env
    environment:
      GATEWAY_HEALTH_URL: "http://hermes:8642"
    # INTERNAL-ONLY: not bound to a host port. Reach via:
    #   ssh -L 9119:172.17.0.1:9119 root@<elestio-vm>
    # then open http://localhost:9119 locally.
    # To make it public, uncomment the ports block and open a SECOND Elestio pipeline.
    # ports:
    #   - "172.17.0.1:9119:9119"
    expose: ["9119"]
    volumes:
      - ./storage/hermes:/opt/data:ro   # read-only — never two writers on same data dir
    shm_size: "256m"
    depends_on:
      hermes:
        condition: service_healthy
    networks: [hermes-net]
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"

networks:
  hermes-net:
    driver: bridge
