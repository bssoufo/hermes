# Hermes Agent on Elestio
# Reverse proxy target port (set in Elestio dashboard): 8080 (the nginx sidecar)
services:
  # Init container: seeds the SDR skill from the repo into the named
  # volume BEFORE hermes starts. Runs as root so it can create the
  # target directory and chown to the hermes user (uid baked into the
  # nousresearch/hermes-agent image). Previous attempt to bind-mount
  # the repo skill read-only failed hard: Hermes's `skill_manage` tool
  # atomically rewrites SKILL.md on self-learning, hitting OSError 30
  # "Read-only file system" and CRASHING the whole gateway with exit 1.
  # Copying the skill into the writable named volume fixes this. Every
  # redeploy re-seeds, so the live skill always matches git HEAD.
  hermes-init:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-init
    entrypoint: []
    user: root
    command: >
      sh -c '
      set -e ;
      echo "[init] seeding skills/sdr into named volume..." ;
      mkdir -p /data/skills/sdr ;
      cp -rf /repo-skills/sdr/. /data/skills/sdr/ ;
      chown -R hermes:hermes /data/skills ;
      echo "[init] skills/sdr seeded and owned by hermes:hermes" ;
      ls -la /data/skills/sdr/
      '
    volumes:
      - hermes-data:/data
      - ./storage/hermes/skills/sdr:/repo-skills/sdr:ro
    restart: "no"
    networks: [hermes-net]

  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    env_file: .env
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"   # required for non-loopback access
      API_SERVER_PORT: "8642"
      TERMINAL_ENV: "local"        # no docker-in-docker needed for SDR use-case
    # Hermes is reached only through the nginx sidecar on the internal
    # docker network (service name "hermes"). No host port binding
    # required -- reduces attack surface.
    expose: ["8642", "8644"]
    volumes:
      # Named volume = Docker-managed permissions (the container user 'hermes'
      # owns it automatically). Elestio-safe: bind-mounting the repo clone
      # fails because Elestio clones as root.
      - hermes-data:/opt/data
      # Declarative config is bind-mounted as a single read-only file so the
      # repo's config.yaml still drives MCP servers / skill dirs / etc.
      # This is safe: Hermes never writes to config.yaml at runtime.
      - ./storage/hermes/config.yaml:/opt/data/config.yaml:ro
      # NOTE: skills/sdr is NOT bind-mounted. Its content is copied into
      # the named volume by the hermes-init container on every boot, so
      # Hermes's skill_manage tool can patch it (needs writable fs).
    depends_on:
      hermes-init:
        condition: service_completed_successfully
    shm_size: "1gb"                # Playwright/Chromium needs > 64MB /dev/shm
    healthcheck:
      # Python is guaranteed in the Hermes image; wget/curl are not.
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8642/health', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks: [hermes-net]
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "1.8"
        reservations:
          memory: 1G
          cpus: "0.5"

  dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    # --insecure is required since we bind to 0.0.0.0 so the nginx sidecar
    # on the internal docker network can reach it. The dashboard is NOT
    # exposed publicly (no ports mapping, no nginx route yet), so the
    # "untrusted networks" warning doesn't apply -- it only sees the
    # hermes-net bridge.
    command: dashboard --host 0.0.0.0 --insecure
    env_file: .env
    environment:
      GATEWAY_HEALTH_URL: "http://hermes:8642"
    # INTERNAL-ONLY: not bound to a host port. Reach via:
    #   ssh -L 9119:172.17.0.1:9119 root@<elestio-vm>
    # then open http://localhost:9119 locally.
    # To make it public, uncomment the ports block and open a SECOND Elestio pipeline.
    # ports:
    #   - "172.17.0.1:9119:9119"
    expose: ["9119"]
    volumes:
      # Shared named volume; read-only to prevent two-writers corruption.
      - hermes-data:/opt/data:ro
    shm_size: "256m"
    depends_on:
      hermes:
        # service_started (not service_healthy) so the dashboard and the
        # Elestio deploy don't fail if the healthcheck is slow/flaky. The
        # dashboard tolerates a cold gateway; it retries on its own.
        condition: service_started
    networks: [hermes-net]
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"

  # Tails Hermes's file-based logs (/opt/data/logs/*.log) to stdout so
  # they show up in `docker compose logs` and in Elestio's dashboard
  # logs UI alongside the gateway/dashboard/nginx output. Read-only
  # mount -- Hermes still owns the files.
  #
  # The named volume `hermes-data` holds everything Hermes keeps under
  # /opt/data (config, sessions, memories, logs, ...). Mounting it at
  # /data in this sidecar means the log files are at /data/logs/*.log.
  # Wait until they exist before tailing -- Hermes creates agent.log
  # on first log write, which can lag boot by a few seconds.
  log-tailer:
    image: alpine:latest
    container_name: hermes-log-tail
    restart: unless-stopped
    command: >
      sh -c '
      until [ -f /data/logs/agent.log ] && [ -f /data/logs/errors.log ]; do
        echo "[log-tailer] waiting for hermes log files to be created..." ;
        sleep 3 ;
      done ;
      echo "[log-tailer] log files ready, streaming..." ;
      tail -n 50 -F /data/logs/agent.log /data/logs/errors.log 2>&1
      '
    volumes:
      - hermes-data:/data:ro
    depends_on:
      hermes:
        condition: service_started
    networks: [hermes-net]
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.1"

  nginx:
    image: nginx:alpine
    container_name: hermes-nginx
    restart: unless-stopped
    # Binds docker0 gateway -- Elestio's host nginx-auto-ssl reverse-proxies
    # this port with Let's Encrypt. Set Elestio "Reverse Proxy Target Port"
    # to 8880 in the dashboard (one-time config change).
    # Port 8080 is typically already allocated by Elestio's own stack on
    # the VM; 8880 is chosen to avoid that conflict.
    ports:
      - "172.17.0.1:8880:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Basic auth file for /dashboard/. apr1-hashed password; safe to
      # commit since only the hash is stored. Rotate via:
      #   openssl passwd -apr1 <newpass>
      # and update nginx/.htpasswd with "<user>:<hash>" then redeploy.
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      hermes:
        condition: service_started
      dashboard:
        condition: service_started
    networks: [hermes-net]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"

volumes:
  hermes-data:

networks:
  hermes-net:
    driver: bridge
