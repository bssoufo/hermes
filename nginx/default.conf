# nginx reverse proxy in front of Hermes services.
# Elestio's managed nginx terminates SSL and forwards to this one over HTTP.
# This nginx routes by path to the right Hermes container.
#
# External URL                                   -> Internal service
# -----------------------------------------------------------------
# https://<domain>/                              -> hermes:8642   (OpenAI-compat API)
# https://<domain>/v1/chat/completions           -> hermes:8642   (same)
# https://<domain>/health                        -> hermes:8642   (same)
# https://<domain>/webhooks/ghl-inbound          -> hermes:8644   (webhook adapter)
# https://<domain>/dashboard/                    -> dashboard:9119 (behind basic auth)

# Shared proxy headers block -- included via `include` below.
# (nginx-alpine doesn't support include from another file in this image's default
# structure without path tweaks, so the headers are inlined in each location.)

server {
    listen 80 default_server;
    server_name _;

    # Safety: reject requests we don't route explicitly.
    client_max_body_size 2m;

    # Keep latency headroom for multi-turn tool-use agent responses.
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
    proxy_connect_timeout 10s;

    # Webhook adapter: GHL / external event sources POST here.
    # Must come BEFORE the catch-all `location /`.
    location /webhooks/ {
        proxy_pass http://hermes:8644;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hermes dashboard (admin UI). Protected by basic auth -- the
    # dashboard itself exposes API keys and config without robust
    # authentication. Credentials live in /etc/nginx/.htpasswd
    # mounted from ./nginx/.htpasswd in docker-compose.
    # Change password via: openssl passwd -apr1 <newpass> and update
    # nginx/.htpasswd then redeploy.
    location /dashboard/ {
        auth_basic "Hermes Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;
        # Strip /dashboard prefix before forwarding upstream.
        rewrite ^/dashboard/(.*)$ /$1 break;
        proxy_pass http://dashboard:9119;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Dashboard may use WebSockets for live updates.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Everything else (gateway API, health, models): Hermes on 8642.
    location / {
        proxy_pass http://hermes:8642;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
