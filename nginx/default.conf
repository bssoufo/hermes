# nginx reverse proxy in front of Hermes services.
# Elestio's managed nginx terminates SSL and forwards to this one over HTTP.
# This nginx routes by path to the right Hermes container.
#
# The Hermes dashboard is a SPA that doesn't support a path prefix, so we
# give IT the root path (/) and route explicit API paths (/v1/, /health,
# /webhooks/) to the gateway instead. Existing clients (GHL, Bruno)
# already hit those explicit paths, so nothing breaks on their side.
#
# External URL                                   -> Internal service
# -----------------------------------------------------------------
# https://<domain>/                              -> dashboard:9119 (basic auth)
# https://<domain>/sessions, /skills, /memory... -> dashboard:9119 (SPA routes)
# https://<domain>/assets/*, /api/*, /ws/*       -> dashboard:9119 (SPA deps)
# https://<domain>/v1/chat/completions           -> hermes:8642   (gateway)
# https://<domain>/v1/models                     -> hermes:8642   (gateway)
# https://<domain>/health                        -> hermes:8642   (healthcheck)
# https://<domain>/webhooks/ghl-inbound          -> hermes:8644   (webhook adapter)

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 2m;
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
    proxy_connect_timeout 10s;

    # -- Explicit gateway API paths (no auth at nginx level; Hermes
    # validates bearer API_SERVER_KEY internally). Must come BEFORE the
    # catch-all `location /` that serves the dashboard.

    location /v1/ {
        proxy_pass http://hermes:8642;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://hermes:8642/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # -- External event sources (GHL workflows) POST here. No basic auth;
    # the webhook adapter inside Hermes validates HMAC signatures per
    # route (currently INSECURE_NO_AUTH for initial testing).
    location /webhooks/ {
        proxy_pass http://hermes:8644;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -- Hermes dashboard (admin UI). Protected by basic auth at nginx
    # because the dashboard has no robust authentication of its own.
    # Credentials live in /etc/nginx/.htpasswd mounted from
    # ./nginx/.htpasswd. Rotate: openssl passwd -apr1 <newpass>, then
    # edit nginx/.htpasswd and redeploy.
    #
    # The catch-all `location /` covers both the SPA entrypoint AND any
    # client-side-router paths (/sessions, /skills, /memory, /settings)
    # because the dashboard backend returns index.html for unknown paths
    # and the JS router handles them. Static assets (/assets/*) and any
    # backend calls (/api/*, /ws/*) also fall through here.
    location / {
        auth_basic "Hermes Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://dashboard:9119;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade for live session updates.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Buffered to 0 so SSE-style streams from the dashboard are
        # not held back by nginx response buffering.
        proxy_buffering off;
    }
}
