# Local-only override for smoke testing on a dev machine.
# Use with: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# Differences from the Elestio-ready base:
#   - Ports bind to 127.0.0.1 (not 172.17.0.1, which only exists on Linux docker hosts)
#   - Loads .env.local in addition to .env so you can override per-machine values
#   - Hermes ports also exposed directly for debug bypass of nginx
#   - Dashboard reachable directly on http://127.0.0.1:9119

services:
  hermes:
    env_file:
      - .env
      - .env.local
    # Expose Hermes ports directly to localhost for debug (nginx is still
    # the primary entry point at 127.0.0.1:8080). Bypass lets you hit
    # 127.0.0.1:8642 to isolate nginx vs Hermes during troubleshooting.
    ports:
      - "127.0.0.1:8642:8642"
      - "127.0.0.1:8644:8644"

  nginx:
    ports: !override
      - "127.0.0.1:8080:80"

  dashboard:
    env_file:
      - .env
      - .env.local
    ports:
      - "127.0.0.1:9119:9119"
